<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICE Exchange</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      font-family:Arial, sans-serif;
      text-align:center;
      color:#fff;
    }

    .container{
      padding-top:60px;
    }

    h1{
      font-size:32px;
      font-weight:800;
      margin-bottom:25px;
    }

    .language-buttons{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .language-buttons button{
      padding:12px 22px;
      border:none;
      border-radius:5px;
      background:#1f1f1f;
      color:#fff;
      font-size:16px;
      cursor:pointer;
    }

    .language-buttons .active{
      background:#00ff7f;
      color:#000;
    }

    .whatsapp-text{
      margin-top:90px;
      color:#00ff7f;
      font-size:22px;
      font-weight:600;
    }

    .whatsapp-btn{
      display:inline-block;
      margin-top:18px;
      background:#25D366;
      color:#fff;
      text-decoration:none;
      padding:15px 38px;
      border-radius:40px;
      font-size:22px;
      font-weight:500;
    }

    /* LOGO SECTION */

    .logo-box {
      width: 420px;
      background: #000;
      text-align: center;
      padding: 15px;
      margin: 70px auto 0;
    }

    .logo-box img {
      width: 100%;
      height: auto;
      display: block;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>FOR MORE INFORMATION</h1>

    <div class="language-buttons">
      <button class="active">English</button>
      <button>हिन्दी</button>
      <button>ಕನ್ನಡ</button>
      <button>தமிழ்</button>
      <button>తెలుగు</button>
    </div>

    <div class="whatsapp-text">
      👇 Click below to message on WhatsApp
    </div>

    <a href="https://wa.me/+447770775390" class="whatsapp-btn">
      Message on WhatsApp
    </a>

    <!-- LOGO ATTACHED -->

    <div class="logo-box">
      <img src="ice777.png" alt="ICE777 Logo">
    </div>

  </div>


</body></html>
